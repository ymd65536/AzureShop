<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Azure Shop Demo</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero-content">
        <p class="eyebrow">Azure Demo</p>
        <h1>Azure Shop Demo</h1>
        <p>限定アイテムを選んで、すぐにお届け先を入力して注文できます。</p>
        <div class="hero-badges">
          <span>送料無料</span>
          <span>翌日配送</span>
          <span>安心返品</span>
        </div>
      </div>
    </header>

    <main>
      <section class="shop-intro">
        <div>
          <p class="section-label">おすすめ商品</p>
          <h2>気になるアイテムを選んで、カートへ。</h2>
        </div>
        <p class="intro-copy">お買い物はシンプル。商品を選び、数量を調整して、最後にお届け先を入力するだけです。</p>
      </section>

      <section class="products" id="products"></section>

      <section class="checkout-card cart-card" id="cart-section">
        <div class="cart-header">
          <h2>カート</h2>
          <span id="cart-count">0点</span>
        </div>
        <div id="cart-items" class="cart-items">
          <div class="empty-state">
            <strong>まだ商品が入っていません</strong>
            <p>気になるアイテムを選んでください。</p>
          </div>
        </div>
        <div class="cart-summary">
          <strong>合計: <span id="cart-total">¥0</span></strong>
        </div>
      </section>

      <section class="checkout-card hidden" id="checkout-section">
        <h2>決済</h2>
        <form id="checkout-form">
          <label>
            お名前
            <input name="customerName" placeholder="Azure 太郎" required />
          </label>
          <label>
            メールアドレス
            <input name="email" type="email" placeholder="azure@example.com" required />
          </label>
          <label>
            お届け先
            <textarea name="address" rows="3" placeholder="東京スカイツリー"></textarea>
          </label>
          <button type="button" id="confirm-button">注文内容を確認する</button>
        </form>
        <p id="result" class="result"></p>
      </section>

      <section class="checkout-card">
        <h2>注文一覧</h2>
        <div id="orders"></div>
      </section>

      <div id="order-modal" class="modal hidden" aria-hidden="true">
        <div class="modal-content">
          <button id="close-modal" class="close-button" type="button">×</button>
          <h3>注文詳細</h3>
          <div id="modal-body"></div>
        </div>
      </div>

      <div id="confirm-modal" class="modal hidden" aria-hidden="true">
        <div class="modal-content confirm-modal-content">
          <button id="close-confirm-modal" class="close-button" type="button">×</button>
          <h3>注文内容の確認</h3>
          <div id="confirm-body"></div>
          <div class="confirm-actions">
            <button type="button" id="cancel-confirm" class="secondary-button">戻る</button>
            <button type="button" id="submit-order" class="primary-button">この内容で注文する</button>
          </div>
        </div>
      </div>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
